services:
  # MySQL Database
  - type: pserv
    name: ai-healthos-mysql
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile.mysql
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
      - key: MYSQL_DATABASE
        value: ai_healthos
      - key: MYSQL_USER
        value: aihealthos
      - key: MYSQL_PASSWORD
        generateValue: true

  # Backend Service
  - type: web
    name: ai-healthos-backend
    env: docker
    plan: starter
    dockerfilePath: ./ai-healthos-backend/Dockerfile
    healthCheckPath: /actuator/health
    envVars:

      # ✅ Correct DB URL
      - key: SPRING_DATASOURCE_URL
        fromService:
          name: ai-healthos-mysql
          type: pserv
          property: connectionString

      # ✅ manually set username
      - key: SPRING_DATASOURCE_USERNAME
        value: aihealthos

      # ✅ password from env
      - key: SPRING_DATASOURCE_PASSWORD
        fromService:
          name: ai-healthos-mysql
          type: pserv
          envVarKey: MYSQL_PASSWORD

      - key: AI_SERVICE_URL
        fromService:
          name: ai-healthos-ai-service
          type: web
          property: url

      - key: AI_SERVICE_API_KEY
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: STORAGE_PATH
        value: /app/uploads

  # AI Service
  - type: web
    name: ai-healthos-ai-service
    env: docker
    plan: starter
    dockerfilePath: ./ai-healthos-ai-service/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: API_KEY
        generateValue: true
      - key: PORT
        value: 8000

  # Frontend
  - type: web
    name: ai-healthos-frontend
    env: static
    buildCommand: cd ai-healthos-frontend && npm install && npm run build
    staticPublishPath: ./ai-healthos-frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: ai-healthos-backend
          type: web
          property: url
